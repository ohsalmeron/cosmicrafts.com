  <!-- Inline critical CSS for faster rendering -->
  <style>
    /* Critical CSS for above-the-fold content */
    :root {
      --color-primary: #0fb9fd;
      --color-secondary: #6366f1;
      --color-accent: #f59e0b;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-error: #ef4444;
      --color-surface-primary: #1a1a2e;
      --color-surface-secondary: #16213e;
      --color-surface-tertiary: #0f3460;
      --color-text-primary: #ffffff;
      --color-text-secondary: #94a3b8;
      --color-text-muted: #64748b;
      --color-border-subtle: rgba(255, 255, 255, 0.1);
      --color-border-medium: rgba(255, 255, 255, 0.2);
      --cosmic-shadow-sm: 0 4px 8px rgba(0, 0, 0, 0.15);
      --cosmic-shadow-md: 0 8px 16px rgba(0, 0, 0, 0.2);
      --cosmic-shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.25);
    }
    
    * { box-sizing: border-box; }
    
    html { scroll-behavior: smooth; }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e1c 0%, #1a1a2e 50%, #16213e 100%);
      color: var(--color-text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color-surface-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(15, 185, 253, 0.3);
      border-top: 3px solid var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 1200px;
      padding: 0 2rem;
    }
    
    .hero-image {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: var(--cosmic-shadow-lg);
    }
    
    .hero-logo {
      max-width: 300px;
      height: auto;
      margin: 2rem 0;
    }
    
    .hero-title {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      margin: 1rem 0;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--color-border-subtle);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--color-primary);
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--cosmic-shadow-md);
    }
    
    @media (max-width: 768px) {
      .hero-content { padding: 0 1rem; }
      .hero-logo { max-width: 200px; }
    }
    
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    
    *:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }
    
    img {
      max-width: 100%;
      height: auto;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    h1, h2, h3, h4, h5, h6 {
      margin: 0 0 1rem 0;
      font-weight: 600;
      line-height: 1.2;
    }
    
    p { margin: 0 0 1rem 0; }
    
    .fade-enter-active, .fade-leave-active {
      transition: opacity 0.3s ease;
    }
    
    .fade-enter-from, .fade-leave-to {
      opacity: 0;
    }
  </style>
